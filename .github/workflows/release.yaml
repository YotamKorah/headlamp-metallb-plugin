name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    name: Build and Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Extract version from tag
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=$GITHUB_REF_NAME" >> $GITHUB_OUTPUT
          echo "📦 Release version: $VERSION"

      - name: Update version in package.json
        run: npm version ${{ inputs.version }} --no-git-tag-version --allow-same-version

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test

      - name: Build plugin
        run: npm run build

      - name: Package plugin
        run: npm run package

      - name: Calculate checksum
        id: checksum
        run: |
          TARBALL=$(ls *headlamp-metallb-*.tar.gz)
          CHECKSUM=$(shasum -a 256 "$TARBALL" | cut -d' ' -f1)
          echo "checksum=$CHECKSUM" >> $GITHUB_OUTPUT
          echo "tarball=$TARBALL" >> $GITHUB_OUTPUT
          echo "📋 Checksum: $CHECKSUM"
          echo "📦 Tarball: $TARBALL"

      - name: Update artifacthub-pkg.yml
        run: |
          VERSION=${{ steps.version.outputs.version }}
          CURRENT_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          ARCHIVE_URL="https://github.com/YotamKorah/headlamp-metallb-plugin/releases/download/v${VERSION}/${{ steps.checksum.outputs.tarball }}"
          CHECKSUM="sha256:${{ steps.checksum.outputs.checksum }}"

          sed -i "s/^version: .*/version: \"${VERSION}\"/" artifacthub-pkg.yml
          sed -i "s/^createdAt: .*/createdAt: \"${CURRENT_DATE}\"/" artifacthub-pkg.yml
          sed -i "s|headlamp/plugin/archive-url: .*|headlamp/plugin/archive-url: \"${ARCHIVE_URL}\"|" artifacthub-pkg.yml
          sed -i "s|headlamp/plugin/archive-checksum: .*|headlamp/plugin/archive-checksum: \"${CHECKSUM}\"|" artifacthub-pkg.yml

          echo "✅ artifacthub-pkg.yml updated"
          echo "   version: ${VERSION}"
          echo "   createdAt: ${CURRENT_DATE}"
          echo "   archive-url: ${ARCHIVE_URL}"
          echo "   archive-checksum: ${CHECKSUM}"

      - name: Copy artifacthub-pkg.yml to release directory
        run: |
          mkdir -p release/${{ steps.version.outputs.version }}
          cp artifacthub-pkg.yml release/${{ steps.version.outputs.version }}/
          cp README.md release/${{ steps.version.outputs.version }}/

      - name: Commit artifacthub-pkg.yml
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          BRANCH="chore/artifacthub-v${{ steps.version.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add .
          git commit -m "chore: update artifacthub metadata for v${{ steps.version.outputs.version }}"
          git push origin "$BRANCH"
          gh pr create \
            --title "chore: update artifacthub metadata for v${{ steps.version.outputs.version }}" \
            --body "Automated update of artifacthub-pkg.yml for release v${{ steps.version.outputs.version }}" \
            --base main \
            --head "$BRANCH"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ steps.version.outputs.tag }}
          body: |
            ## MetalLB Headlamp Plugin ${{ steps.version.outputs.version }}

            ### Installation

            Download the `.tar.gz` file below and extract to your Headlamp plugins directory.

            ### Checksums

            SHA-256: `${{ steps.checksum.outputs.checksum }}`
          files: ${{ steps.checksum.outputs.tarball }}
          draft: false
          prerelease: false

      - name: Release Summary
        if: always()
        run: |
          echo "### 🚀 Release Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** ${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "**Tag:** ${{ steps.version.outputs.tag }}" >> $GITHUB_STEP_SUMMARY
          echo "**Tarball:** ${{ steps.checksum.outputs.tarball }}" >> $GITHUB_STEP_SUMMARY
          echo "**Checksum:** \`${{ steps.checksum.outputs.checksum }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ GitHub Release created" >> $GITHUB_STEP_SUMMARY