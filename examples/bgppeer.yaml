apiVersion: metallb.io/v1beta2
kind: BGPPeer
metadata:
  name: example-bgppeer
  namespace: metallb-system
spec:
  peerAddress: 192.168.1.1
  peerASN: 64512
  myASN: 64500
---
apiVersion: metallb.io/v1beta2
kind: BGPPeer
metadata:
  name: example-bgppeer-full
  namespace: metallb-system
spec:
  peerAddress: 10.0.0.1
  peerASN: 64513
  myASN: 64500
  sourceAddress: 10.0.0.254
  holdTime: 90s
  keepaliveTime: 30s
  ebgpMultiHop: true
  bfdProfile: example-bfdprofile
  nodeSelectors:
    - matchLabels:
        kubernetes.io/os: linux
      matchExpressions:
        - key: node-role.kubernetes.io/worker
          operator: In
          values:
            - "true"
