apiVersion: metallb.io/v1beta1
kind: IPAddressPool
metadata:
  name: example-ipaddresspool
  namespace: metallb-system
spec:
  addresses:
    - 192.168.1.240-192.168.1.250
  autoAssign: true
  avoidBuggyIPs: false
---
apiVersion: metallb.io/v1beta1
kind: IPAddressPool
metadata:
  name: example-ipaddresspool-with-allocation
  namespace: metallb-system
spec:
  addresses:
    - 10.0.0.100-10.0.0.120
    - 10.0.0.200/30
  autoAssign: false
  avoidBuggyIPs: true
  serviceAllocation:
    priority: 50
    namespaces:
      - production
      - staging
    namespaceSelectors:
      - matchLabels:
          environment: production
    serviceSelectors:
      - matchLabels:
          app: web
