apiVersion: v1
kind: Service
metadata:
  name: web-frontend
  namespace: default
  annotations:
    metallb.universe.tf/ip-allocated-from-pool: example-ipaddresspool
spec:
  type: LoadBalancer
  selector:
    app: web-frontend
  ports:
    - name: http
      port: 80
      targetPort: 8080
      protocol: TCP
    - name: https
      port: 443
      targetPort: 8443
      protocol: TCP
status:
  loadBalancer:
    ingress:
      - ip: 192.168.1.240
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: default
  annotations:
    metallb.universe.tf/ip-allocated-from-pool: example-ipaddresspool
spec:
  type: LoadBalancer
  selector:
    app: api-gateway
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      protocol: TCP
status:
  loadBalancer:
    ingress:
      - ip: 192.168.1.241
---
apiVersion: v1
kind: Service
metadata:
  name: database-primary
  namespace: default
  annotations:
    metallb.universe.tf/ip-allocated-from-pool: example-ipaddresspool-with-allocation
spec:
  type: LoadBalancer
  selector:
    app: database
    role: primary
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
      protocol: TCP
status:
  loadBalancer:
    ingress:
      - ip: 10.0.0.100
